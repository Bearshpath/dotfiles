# --- HYPRLOCK WITH PYWAL COLORS ---
source = ~/.cache/wal/colors-hyprland.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
}

# DYNAMIC BACKGROUND
background {
    monitor =
    path = /tmp/current_wallpaper.jpg
    blur_passes = 2 # Blurs the background for a "frosted glass" look
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME (Big and Bold)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    color = $foreground
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
}

# DATE (Below Time, Colored with Accent)
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = $color2
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -280
    halign = center
    valign = top
}

# PROFILE PICTURE (With Accent Border)
image {
    monitor =
    path = ~/.config/hypr/assets/hyprlock-pfp.jpg
    size = 150
    border_size = 4
    border_color = $color2
    position = 0, 50
    halign = center
    valign = center
}

# INPUT FIELD (Synced Colors)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    # Outer ring matches your accent color
    outer_color = $color2
    # Inner background matches your wallpaper dark color
    inner_color = $background
    # Text color matches wallpaper light color
    font_color = $foreground

    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# WELCOME LABEL
label {
    monitor =
    text = Hello, $USER
    color = $foreground
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -190
    halign = center
    valign = center
}
